<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Maratón Moroleón 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- CDN de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- CDN de Chart.js para renderizar los minigráficos dinámicamente -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --naranja: #FF5500;
            --oscuro-puro: #0D0D0D;
            --oscuro-tarjeta: #1A1A1A;
            --oscuro-claro: #262626;
            --blanco: #EAEAEA;
            --verde-exito: #2ECC71;
            --amarillo-espera: #F1C40F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--oscuro-puro); color: var(--blanco); padding: 30px; }
        h1, h2, h3, th, .btn-buscar { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        .dashboard-header { margin-bottom: 30px; border-bottom: 2px solid var(--naranja); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .dashboard-header h1 { font-size: 2.2rem; }
        .dashboard-header h1 span { color: var(--naranja); }

        /* --- MENÚ INTERACTIVO SELECCIÓN DE GRÁFICOS --- */
        .controls-container { display: flex; align-items: center; gap: 10px; }
        .controls-container label { font-family: 'Oswald'; font-size: 1rem; color: #888; text-transform: uppercase; }
        .graph-selector { padding: 10px 15px; background: var(--oscuro-tarjeta); border: 1px solid var(--oscuro-claro); border-radius: 6px; color: white; font-family: 'Montserrat'; font-weight: 600; cursor: pointer; outline: none; transition: 0.3s; }
        .graph-selector:focus { border-color: var(--naranja); }

        /* --- SECCIÓN DE METRICAS Y GRAFICOS --- */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; transition: 0.3s; }
        .metric-card { background: var(--oscuro-tarjeta); border: 1px solid var(--oscuro-claro); border-radius: 8px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 160px; }
        .metric-card h3 { font-size: 1rem; color: #888; margin-bottom: 10px; letter-spacing: 1px; }
        .metric-number { font-size: 2.5rem; font-weight: bold; color: var(--naranja); font-family: 'Oswald'; }
        
        .chart-card { background: var(--oscuro-tarjeta); border: 1px solid var(--oscuro-claro); border-radius: 8px; padding: 15px; min-height: 180px; display: flex; flex-direction: column; transition: all 0.4s ease; }
        .chart-card h3 { font-size: 0.9rem; color: #888; margin-bottom: 10px; border-left: 3px solid var(--naranja); padding-left: 8px; }
        .chart-container { flex: 1; position: relative; width: 100%; height: 110px; }

        /* Buscador */
        .search-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 15px; background: var(--oscuro-tarjeta); border: 1px solid var(--oscuro-claro); border-radius: 6px; color: white; font-size: 1rem; }
        .search-input:focus { border-color: var(--naranja); outline: none; }
        .btn-buscar { padding: 0 30px; background: var(--naranja); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-buscar:hover { background: #ff6622; box-shadow: 0 0 10px rgba(255,85,0,0.4); }

        /* Tabla de Control */
        .table-wrapper { background: var(--oscuro-tarjeta); border: 1px solid var(--oscuro-claro); border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #111; color: #888; padding: 15px 20px; font-size: 0.9rem; letter-spacing: 1px; border-bottom: 2px solid var(--oscuro-claro); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--oscuro-claro); font-size: 0.9rem; }
        tr:hover { background: rgba(255, 85, 0, 0.03); }

        .badge-status { padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-status.aprobado { background: rgba(46, 204, 113, 0.15); color: var(--verde-exito); border: 1px solid var(--verde-exito); }
        .badge-status.pendiente { background: rgba(241, 196, 15, 0.15); color: var(--amarillo-espera); border: 1px solid var(--amarillo-espera); }
        
        .text-curp { font-family: monospace; color: var(--naranja); font-weight: bold; }
        .text-monto { font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>PANEL DE CONTROL <span>| RENDIMIENTO Y PAGOS</span></h1>
        
        <!-- MENÚ INTERACTIVO -->
        <div class="controls-container">
            <label for="selectGrafico">Visualizar:</label>
            <select id="selectGrafico" class="graph-selector" onchange="alternarGraficos()">
                <option value="todos">Mostrar Todo</option>
                <option value="cat">Categorías</option>
                <option value="gen">Género</option>
                <option value="edad">Rangos de Edad</option>
                <option value="proc">Procedencia</option>
            </select>
        </div>
    </div>

    <!-- SECCIÓN DE MINIGRÁFICOS Y MÉTRICAS -->
    <div class="metrics-grid" id="contenedorMetricas">
        <!-- Total Atletas -->
        <div class="metric-card" id="cardTotal">
            <h3>Total Atletas Pagados</h3>
            <div class="metric-number" id="txtTotalAtletas">0</div>
        </div>

        <!-- Mini Gráfico Categorías (Barras) -->
        <div class="chart-card" id="cardCat">
            <h3>Categorías</h3>
            <div class="chart-container">
                <canvas id="chartCategorias"></canvas>
            </div>
        </div>

        <!-- Mini Gráfico Género (Dona) -->
        <div class="chart-card" id="cardGen">
            <h3>Género</h3>
            <div class="chart-container">
                <canvas id="chartGenero"></canvas>
            </div>
        </div>

        <!-- Mini Gráfico Edades (Línea) -->
        <div class="chart-card" id="cardEdad">
            <h3>Rangos de Edad</h3>
            <div class="chart-container">
                <canvas id="chartEdades"></canvas>
            </div>
        </div>

        <!-- Procedencia de Atletas (Pastel) -->
        <div class="chart-card" id="cardProc">
            <h3>Procedencia de Atletas</h3>
            <div class="chart-container">
                <canvas id="chartProcedencia"></canvas>
            </div>
        </div>
    </div>

    <!-- Buscador -->
    <div class="search-container">
        <input type="text" id="inputBuscar" class="search-input" placeholder="Buscar por CURP, Nombre del Atleta o Método de Pago...">
        <button class="btn-buscar" onclick="filtrarPagos()">BUSCAR ATLETA</button>
    </div>

    <!-- Tabla de Control de Pagos -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nombre Atleta</th>
                    <th>CURP Atleta</th>
                    <th>Concepto / Distancia</th>
                    <th>Método Pago</th>
                    <th>Monto</th>
                    <th>Fecha Registro</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody id="tablaPagosBody">
                <tr>
                    <td colspan="7" style="text-align: center; color: #888;">Cargando transacciones en tiempo real desde Supabase...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://xhiprzmvleolibzprqom.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LVD_xghTp8MmfutMs3RoDA_v1c4rxrg"; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let todosLosPagos = [];
        let instanciasGraficos = {}; 

        window.addEventListener('DOMContentLoaded', () => {
            cargarTransacciones();
        });

        async function cargarTransacciones() {
            try {
                // 1. Obtener todos los pagos validados de "pagos_registro"
                const { data: pagos, error: errPagos } = await _supabase
                    .from('pagos_registro')
                    .select('*')
                    .order('fecha_registro', { ascending: false });

                if (errPagos) throw errPagos;

                // CORRECCIÓN AQUÍ: Se eliminaron los espacios en blanco entre las columnas para evitar el Error 400
                const { data: atletas, error: errAtletas } = await _supabase
                    .from('cedula_registro')
                    .select('curp,nombres,primer_apellido,segundo_apellido,categoria,sexo,edad,procedencia,estado');

                if (errAtletas) console.error("Error al traer atletas:", errAtletas);

                // Crear un diccionario mapeado para optimizar el cruce de datos
                const mapaAtletas = {};
                if (atletas) {
                    atletas.forEach(a => {
                        const nombreCompleto = `${a.nombres || ''} ${a.primer_apellido || ''} ${a.segundo_apellido || ''}`.trim();
                        mapaAtletas[a.curp.toUpperCase().trim()] = {
                            nombre: nombreCompleto.toUpperCase(),
                            categoria: a.categoria || 'Libre',
                            sexo: a.sexo || 'No especificado',
                            edad: parseInt(a.edad) || 25,
                            procedencia: a.procedencia || a.estado || 'N/A'
                        };
                    });
                }

                if (!pagos || pagos.length === 0) {
                    document.getElementById('tablaPagosBody').innerHTML = `
                        <tr><td colspan="7" style="text-align: center; padding: 30px; color: #888;">⚠️ No se han encontrado pagos en "pagos_registro".</td></tr>`;
                    generarEstadisticasYGraficos([]);
                    return;
                }

                // 3. Mapear y combinar la información limpia
                todosLosPagos = pagos.map(pago => {
                    const curpKey = (pago.curp_atleta || '').toUpperCase().trim();
                    const infoAtleta = mapaAtletas[curpKey] || { nombre: "ATLETA NO ENCONTRADO", categoria: "Libre", sexo: "No especificado", edad: 25, procedencia: "N/A" };
                    
                    return {
                        nombre: infoAtleta.nombre,
                        curp: curpKey || "SIN CURP",
                        concepto: pago.concepto_pago || "Inscripción Carrera",
                        metodo: pago.metodo_pago || "No especificado",
                        monto: pago.monto_pagado ? `$${parseFloat(pago.monto_pagado).toFixed(2)} MXN` : "$0.00 MXN",
                        fecha: formatearFecha(pago.fecha_registro) + " " + (pago.hora_registro || ''),
                        estatus: pago.estatus_pago || "PENDIENTE",
                        categoria: infoAtleta.categoria,
                        sexo: infoAtleta.sexo,
                        edad: infoAtleta.edad,
                        procedencia: infoAtleta.procedencia
                    };
                });

                renderizarTabla(todosLosPagos);
                generarEstadisticasYGraficos(todosLosPagos);

            } catch (error) {
                console.error("Error cargando el panel administrativo:", error);
                document.getElementById('tablaPagosBody').innerHTML = `
                    <tr><td colspan="7" style="text-align: center; color: #ff5500; padding: 20px;">Error de comunicación con Supabase.</td></tr>`;
            }
        }

        function renderizarTabla(datos) {
            const tbody = document.getElementById('tablaPagosBody');
            tbody.innerHTML = "";

            datos.forEach(fila => {
                const tr = document.createElement('tr');
                const claseEstatus = fila.estatus.toLowerCase() === 'aprobado' ? 'aprobado' : 'pendiente';

                tr.innerHTML = `
                    <td style="font-weight: 600; color: white;">${fila.nombre}</td>
                    <td><span class="text-curp">${fila.curp}</span></td>
                    <td>${fila.concepto}</td>
                    <td>${fila.metodo}</td>
                    <td><span class="text-monto">${fila.monto}</span></td>
                    <td>${fila.fecha}</td>
                    <td><span class="badge-status ${claseEstatus}">${fila.estatus}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function generarEstadisticasYGraficos(datos) {
            document.getElementById('txtTotalAtletas').innerText = datos.length;

            let categoriasCount = {};
            let generoCount = { 'Varonil': 0, 'Femenil': 0, 'No especificado': 0 };
            let edadCount = { '18-29': 0, '30-39': 0, '40-49': 0, '50+': 0 };
            let procedenciaCount = {};

            datos.forEach(d => {
                const cat = d.categoria.trim();
                categoriasCount[cat] = (categoriasCount[cat] || 0) + 1;

                let sx = d.sexo.toLowerCase().includes('m') || d.sexo.toLowerCase().includes('v') ? 'Varonil' : 'Femenil';
                if(d.sexo === 'No especificado') sx = 'No especificado';
                generoCount[sx] = (generoCount[sx] || 0) + 1;

                if (d.edad >= 18 && d.edad <= 29) edadCount['18-29']++;
                else if (d.edad >= 30 && d.edad <= 39) edadCount['30-39']++;
                else if (d.edad >= 40 && d.edad <= 49) edadCount['40-49']++;
                else if (d.edad >= 50) edadCount['50+']++;

                procedenciaCount[d.procedencia] = (procedenciaCount[d.procedencia] || 0) + 1;
            });

            const optionsBase = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false }, ticks: { color: '#888', font: { size: 9 } } }, y: { display: false } }
            };

            Object.keys(instanciasGraficos).forEach(key => instanciasGraficos[key].destroy());

            // 1. Categorías
            instanciasGraficos.cat = new Chart(document.getElementById('chartCategorias'), {
                type: 'bar',
                data: {
                    labels: Object.keys(categoriasCount).length ? Object.keys(categoriasCount) : ['Sin Datos'],
                    datasets: [{ data: Object.values(categoriasCount).length ? Object.values(categoriasCount) : [0], backgroundColor: '#FF5500', barThickness: 25 }]
                },
                options: optionsBase
            });

            // 2. Género
            instanciasGraficos.gen = new Chart(document.getElementById('chartGenero'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(generoCount),
                    datasets: [{ data: Object.values(generoCount), backgroundColor: ['#FF5500', '#262626', '#444'], borderWidth: 0 }]
                },
                options: { ...optionsBase, scales: undefined, plugins: { legend: { display: true, position: 'right', labels: { color: '#aaa', font: { size: 9 } } } } }
            });

            // 3. Edades
            instanciasGraficos.edad = new Chart(document.getElementById('chartEdades'), {
                type: 'line',
                data: {
                    labels: Object.keys(edadCount),
                    datasets: [{ data: Object.values(edadCount), borderColor: '#FF5500', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, pointRadius: 3 }]
                },
                options: optionsBase
            });

            // 4. Procedencia
            const labelsProc = Object.keys(procedenciaCount).length ? Object.keys(procedenciaCount) : ['N/A'];
            const dataProc = Object.values(procedenciaCount).length ? Object.values(procedenciaCount) : [1];
            
            instanciasGraficos.proc = new Chart(document.getElementById('chartProcedencia'), {
                type: 'pie',
                data: {
                    labels: labelsProc,
                    datasets: [{ data: dataProc, backgroundColor: ['#FF5500', '#D4AF37', '#262626', '#555'], borderWidth: 1, borderColor: '#1A1A1A' }]
                },
                options: { ...optionsBase, scales: undefined, plugins: { legend: { display: true, position: 'right', labels: { color: '#aaa', font: { size: 9 } } } } }
            });
        }

        // FUNCIÓN DEL MENÚ INTERACTIVO PARA FILTRAR VISTAS DE GRÁFICOS
        function alternarGraficos() {
            const seleccion = document.getElementById('selectGrafico').value;
            const grid = document.getElementById('contenedorMetricas');
            
            const cardCat = document.getElementById('cardCat');
            const cardGen = document.getElementById('cardGen');
            const cardEdad = document.getElementById('cardEdad');
            const cardProc = document.getElementById('cardProc');

            // Mostrar todas las tarjetas por defecto
            cardCat.style.display = 'flex';
            cardGen.style.display = 'flex';
            cardEdad.style.display = 'flex';
            cardProc.style.display = 'flex';
            grid.style.gridTemplateColumns = "repeat(auto-fit, minmax(220px, 1fr))";

            if (seleccion !== 'todos') {
                // Ocultar las que no correspondan
                if (seleccion !== 'cat') cardCat.style.display = 'none';
                if (seleccion !== 'gen') cardGen.style.display = 'none';
                if (seleccion !== 'edad') cardEdad.style.display = 'none';
                if (seleccion !== 'proc') cardProc.style.display = 'none';
                
                // Maximizar el tamaño del contenedor para la gráfica seleccionada
                grid.style.gridTemplateColumns = "1fr 3fr"; 
            }
        }

        function filtrarPagos() {
            const busqueda = document.getElementById('inputBuscar').value.toLowerCase().trim();
            if (!busqueda) {
                renderizarTabla(todosLosPagos);
                return;
            }
            const filtrados = todosLosPagos.filter(item => {
                return item.nombre.toLowerCase().includes(busqueda) || 
                       item.curp.toLowerCase().includes(busqueda) || 
                       item.metodo.toLowerCase().includes(busqueda);
            });
            renderizarTabla(filtrados);
        }

        function formatearFecha(fechaCadena) {
            if (!fechaCadena) return "-";
            const partes = fechaCadena.split('-');
            if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
            return fechaCadena;
        }
    </script>
</body>
</html>
